name: Deploy to TEST

on:
  push:
    branches: [feature/**, bugfix/**]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    
    steps:      
      - uses: actions/checkout@v3
        with:
          # Correction : si vous êtes sur un trigger "push", utilisez github.sha
          ref: ${{ github.sha }}
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install clasp
        run: npm install -g @google/clasp
      
      - name: Deploy to GAS
        env:
          CLASP_TOKEN_JSON: ${{ secrets.CLASP_TOKEN }}
        run: |
          cd app
          
          # 1. Créer le fichier d'auth DIRECTEMENT dans le dossier 'app'
          echo "$CLASP_TOKEN_JSON" > .clasprc.json
          
          # 2. Injecter le script ID de TEST dans le .clasp.json
          sed -i 's/"scriptId":"[^"]*"/"scriptId":"${{ secrets.SCRIPT_ID_TEST }}"/' .clasp.json
          
          # 3. Forcer clasp à utiliser le fichier local
          # On déplace temporairement le fichier vers le HOME du runner juste avant l'exécution
          cp .clasprc.json ~/.clasprc.json
          
          # 4. Exécuter les commandes
          clasp push --force
          clasp deploy --deploymentId ${{ secrets.TEST_DEPLOYMENT_ID }} --description "Deploy ${{ github.sha }}"
      
      - name: Comment PR with deployment info
        uses: actions/github-script@v6
        with:
          script: |
            // For workflow_run, find the PR with the head_sha
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const pr = prs.data.find(p => p.head.sha === context.payload.workflow_run.head_sha);
            if (pr) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 Deployed to TEST environment\n\n**Test URL:** https://script.google.com/macros/d/${{ secrets.TEST_SCRIPT_ID }}/usercache\n\n**Deployment ID:** `${{ secrets.TEST_DEPLOYMENT_ID }}`\n\n**Commit:** `${{ github.event.workflow_run.head_sha }}``
              });
            }
