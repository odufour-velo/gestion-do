name: Deploy to TEST

on:
  push:
    branches: [feature/**, bugfix/**]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    
    steps:      
      - uses: actions/checkout@v3
        with:
          # Correction : si vous êtes sur un trigger "push", utilisez github.sha
          ref: ${{ github.sha }}
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      
      - name: Install clasp
        run: npm install -g @google/clasp
      
      - name: Deploy to GAS
        env:
          CLASP_TOKEN_JSON: ${{ secrets.CLASP_TOKEN }}
          SCRIPT_ID: ${{ secrets.TEST_SCRIPT_ID }}
          DEPLOYMENT_ID: ${{ secrets.TEST_DEPLOYMENT_ID }}
        run: |          
          # --- ÉTAPE A : AUTHENTIFICATION ---
          printf '%s' "$CLASP_TOKEN_JSON" > ~/.clasprc.json
          cat ~/.clasprc.json
          
          cd app
          
          # --- ÉTAPE B : CONFIGURATION PROJET ---
          # On crée le fichier projet .clasp.json (AVEC LE POINT)
          cat <<EOF > ./.clasp.json
          {
            "scriptId": "$SCRIPT_ID",
            "rootDir":"./src",
            "scriptExtensions":[".js",".gs"],
            "htmlExtensions":[".html"],
            "jsonExtensions":[".json"],
            "filePushOrder":["src/Server/Utils.js","src/App.js"],
            "skipSubdirectories":false,
            "projectId": "detailsorganisation"
          }
          EOF

          # --- ÉTAPE C : EXECUTION ---
          # On vérifie que le scriptId n'est pas vide avant de continuer
          if [ -z "$SCRIPT_ID" ]; then
            echo "Erreur : TEST_SCRIPT_ID est vide !"
            exit 1
          fi
          
          # 4. Exécuter les commandes
          npx @google/clasp push --force
          npx @google/clasp deploy --deploymentId $DEPLOYMENT_ID --description "Deploy ${{ github.sha }}"
      
      - name: Comment PR with deployment info
        uses: actions/github-script@v6
        with:
          script: |
            // For workflow_run, find the PR with the head_sha
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const pr = prs.data.find(p => p.head.sha === context.payload.workflow_run.head_sha);
            if (pr) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 Deployed to TEST environment\n\n**Test URL:** https://script.google.com/macros/d/${{ secrets.TEST_SCRIPT_ID }}/usercache\n\n**Deployment ID:** `${{ secrets.TEST_DEPLOYMENT_ID }}`\n\n**Commit:** `${{ github.event.workflow_run.head_sha }}``
              });
            }
