name: Deploy to TEST

on:
  push:
    branches: [feature/**, bugfix/**]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Download artifact from Tests workflow
        uses: actions/download-artifact@v3
        with:
          name: test-results
          path: .
        continue-on-error: true
      
      - uses: actions/checkout@v3
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 0
      
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
      
      - name: Install tools
        run: |
          npm install
          npm install -g @google/clasp
      
      - name: Authenticate with Google
        run: |
          echo "${{ secrets.CLASP_TOKEN }}" > ~/.clasprc.json
          chmod 600 ~/.clasprc.json
      
      - name: Push code to GAS
        run: |
          cd app
          clasp push --force
      
      - name: Deploy to TEST endpoint
        run: |
          cd app
          clasp deploy --deploymentId ${{ secrets.TEST_DEPLOYMENT_ID }} \
                       --description "Test Deploy - Commit: ${{ github.event.workflow_run.head_sha }} - Branch: ${{ github.event.workflow_run.head_branch }}"
      
      - name: Comment PR with deployment info
        uses: actions/github-script@v6
        with:
          script: |
            // For workflow_run, find the PR with the head_sha
            const prs = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open'
            });
            const pr = prs.data.find(p => p.head.sha === context.payload.workflow_run.head_sha);
            if (pr) {
              await github.rest.issues.createComment({
                issue_number: pr.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `🚀 Deployed to TEST environment\n\n**Test URL:** https://script.google.com/macros/d/${{ secrets.TEST_SCRIPT_ID }}/usercache\n\n**Deployment ID:** `${{ secrets.TEST_DEPLOYMENT_ID }}`\n\n**Commit:** `${{ github.event.workflow_run.head_sha }}``
              });
            }
