<script>

const epreuvesList = document.getElementById('epreuvesList');

function renderEpreuves() {

    const epreuvesContainer = document.getElementById('epreuvesContainer');
    const discipline = document.getElementById('discipline').value;
    epreuvesList.innerHTML = '';
    if (!discipline) { epreuvesContainer.classList.add('hidden'); return; }
    epreuvesContainer.classList.remove('hidden');

    const typeDisciplineSelect = document.getElementById('type_discipline');
    document.getElementById('typeDisciplinePanel').classList.toggle('hidden', discipline.toLowerCase() !== 'route' && discipline.toLowerCase() !== 'vtt');

    const disciplineClass = discipline.toLowerCase();
    Array.from(typeDisciplineSelect.options).forEach(option => {
        if (!option.value) {
            option.hidden = false;
            option.disabled = false;
            return;
        }

        const optionMatches = option.classList.contains(disciplineClass);
        option.hidden = !optionMatches;
        option.disabled = !optionMatches;
    });

    const selectedOption = typeDisciplineSelect.selectedOptions[0];
    if (!selectedOption || selectedOption.hidden || selectedOption.disabled || !selectedOption.classList.contains(disciplineClass)) {
        typeDisciplineSelect.value = "";
    }

    const typeDiscipline = typeDisciplineSelect.value;

    const isBMX = discipline.toLowerCase() === 'bmx';
    const isRouteEtape = discipline.toLowerCase() === 'route' && (typeDiscipline === "course_ligne" || typeDiscipline === "u19" || typeDiscipline === "u23");
    
    if (isRouteEtape) {
        document.getElementById('dateLabel').classList.toggle('hidden', true);
        document.getElementById('date').classList.toggle('hidden', true);
        document.getElementById('date').required = false;
        document.getElementById('locationLabel').classList.toggle('hidden', true);
        document.getElementById('location').classList.toggle('hidden', true);
        document.getElementById('location').required = false;
        document.getElementById('permanence').classList.toggle('hidden', false);
    } else {
        document.getElementById('dateLabel').classList.toggle('hidden', false);
        document.getElementById('date').classList.toggle('hidden', false);
        document.getElementById('date').required = true;
        document.getElementById('locationLabel').classList.toggle('hidden', false);
        document.getElementById('location').classList.toggle('hidden', false);
        document.getElementById('location').required = true;
        document.getElementById('permanence').classList.toggle('hidden', true);
    }

    document.getElementById('distCircuitGeneral').classList.toggle('hidden', isRouteEtape);
    document.getElementById('prixGeneraux').classList.toggle('hidden', !(isRouteEtape));

    document.getElementById('bmx_heures').classList.toggle('hidden', !isBMX);
    document.getElementById('epreuvesContainer').classList.toggle('hidden', isBMX);

    // Change the panel title depending on the type
    if (isRouteEtape){
        document.getElementById('epreuvesContainer').getElementsByTagName('h2')[0].textContent = "Détails des étapes";
    } else {
        document.getElementById('epreuvesContainer').getElementsByTagName('h2')[0].textContent = "Détails des épreuves";        
    }

    if (!isBMX) {
        addEpreuveRow();
    }
}

function addEpreuveRow() {

  const catOptions = document.getElementById('categoriesTemplate').innerHTML || '<option value="">-- Choisir --</option>';

    const discipline = document.getElementById('discipline').value;
    const typeDiscipline = document.getElementById('type_discipline').value;
    const div = document.createElement('div');
    div.className = 'epreuve-item';

    let rowHtml = '<div class="row">';
    if ((discipline.toLowerCase() === 'route' && typeDiscipline === 'circuit') || (discipline.toLowerCase() === 'vtt' && typeDiscipline === 'xc')) {
        rowHtml += `
            <div class="field"><label>Dossards</label><input type="time" name="h_doss[]"></div>
            <div class="field"><label>Départ</label><input type="time" name="h_dep[]"></div>
            <div class="field"><label>Tours</label><input type="number" name="tours[]" oninput="calculerDistLigne(this)"></div>
            <div class="field"><label>Distance Totale</label><input type="text" name="dist_totale[]" readonly placeholder=""></div>
            <div class="field"><label>Cat. Min H</label><select name="cat_min_h[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Cat. Max H</label><select name="cat_max_h[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Cat. Min F</label><select name="cat_min_f[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Cat. Max F</label><select name="cat_max_f[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Nb coureurs max</label><input type="number" step="1" name="limitations[]"></div>
            <div class="field"><label>Engag. (€)</label><input type="number" step="0.5" name="prix_engag[]"></div>
            <div class="field"><label>Grille</label><input type="text" name="grille_prix[]"></div>
        `;
    } else if (discipline.toLowerCase() === 'route' && (typeDiscipline === "course_ligne" || typeDiscipline === "u19" || typeDiscipline === "u23")) {
        rowHtml += `
            <div class="field"><label>Date</label><input type="date" name="date[]" required></div>
            <div class="field"><label>Départ</label><input type="time" name="h_dep[]" required></div>
            <div class="field"><label>Ville Départ</label><input type="text" name="v_dep[]" required></div>
            <div class="field"><label>Ville Arrivée</label><input type="text" name="v_arr[]" required></div>
            <div class="field"><label>Distance (km)</label><input type="number" step="0.1" name="dist[]" required></div>
        `;
    } else {
        rowHtml += `
            <div class="field"><label>Dossards</label><input type="time" name="h_doss[]"></div>
            <div class="field"><label>Départ</label><input type="time" name="h_dep[]"></div>
            <div class="field"><label>Cat. Min H</label><select name="cat_min_h[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Cat. Max H</label><select name="cat_max_h[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Cat. Min F</label><select name="cat_min_f[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Cat. Max F</label><select name="cat_max_f[]" class="categories"><option value="">${catOptions}</option></select></div>
            <div class="field"><label>Nb coureurs max</label><input type="number" step="1" name="limitations[]"></div>
        `;
    }
    rowHtml += `<button type="button" class="btn-remove" onclick="this.parentElement.parentElement.remove()">✕</button></div>`;
    div.innerHTML = rowHtml;
    epreuvesList.appendChild(div);
}

// Calcule la distance pour UNE ligne spécifique
function calculerDistLigne(inputTours) {
    const row = inputTours.closest('.row');
    const distCircuit = document.getElementById('dist_circuit').value;
    const tours = inputTours.value;
    const output = row.querySelector('input[name="dist_totale[]"]');
    
    if (distCircuit && tours) {
        const total = parseFloat(distCircuit) * parseInt(tours);
        output.value = total.toFixed(2) + " km";
    } else {
        output.value = "";
    }
}

// Recalcule TOUTES les lignes (utile si on change la distance du circuit après avoir saisi les tours)
function calculerToutesDistances() {
    const allTours = document.getElementsByName('tours[]');
    allTours.forEach(input => calculerDistLigne(input));
}
  
function handleFormSubmit(e){

  e.preventDefault();

  // Get button and status elements
  const form   = document.getElementById('declarationForm');
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('statusMessage');

  if (!form.checkValidity()) {
      status.innerText = "⚠️ Veuillez remplir tous les champs obligatoires (*).";
      status.className = "status-hidden status-error";
      form.reportValidity(); 
      return;
  }

  // Disable button and prepare status
  btn.disabled     = true;
  btn.innerText    = "Envoi en cours...";
  status.className = "status-hidden"; // Reinitialize status

  const finalData = {};
  
  // On itère sur tous les éléments du formulaire
  Array.from(form.elements).forEach(element => {
      // On ne prend que les éléments qui ont un nom et qui sont visibles
      if (element.name && element.closest('.hidden') === null) {
          
          // Gestion des champs multiples (tableaux [])
          if (element.name.endsWith('[]')) {
              const key = element.name.slice(0, -2);
              if (!finalData[key]) finalData[key] = [];
              finalData[key].push(element.value);
          } else {
              finalData[element.name] = element.value;
          }
      }
  });
  console.log(finalData);

  // Envoi vers Google Apps Script (Code.gs)
  google.script.run
      .withSuccessHandler(() => {
        status.innerText = "✅ Données enregistrées avec succès !";
        status.className = "status-hidden status-success";
        btn.innerText = "Enregistré !";
        document.getElementById('declarationForm').reset();
      })
      .withFailureHandler((error) => {
        // Enable button in case of error
        status.innerText = "❌ Erreur : " + error.message;
        status.className = "status-hidden status-error";
        btn.disabled = false;
        btn.innerText = "Réessayer l'envoi";
      })
      .processForm(finalData);

}
  

function loadDisciplines() {
  google.script.run
    .withSuccessHandler(function(payload) {
      const select = document.getElementById('discipline');
      const typeSelect = document.getElementById('type_discipline');

      // On vide l'ancien contenu
      select.innerHTML = '<option value="">-- Choisir --</option>';
      typeSelect.innerHTML = '<option value="">-- Choisir --</option>';

      // On ajoute chaque discipline
      payload.disciplines.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        option.text = item;
        select.appendChild(option);
      });

      // On ajoute les types dynamiquement avec la classe discipline correspondante
      payload.types.forEach(entry => {
        const option = document.createElement('option');
        option.value = entry.type;
        option.text = entry.type;
        option.className = entry.discipline.toLowerCase();
        typeSelect.appendChild(option);
      });
    })
    .getDisciplines();
}

function loadCategories() {
  google.script.run
    .withSuccessHandler(function(list) {
      const template = document.getElementById('categoriesTemplate');
      const baseHtml = '<option value="">-- Choisir --</option>' + list.map(item => `<option value="${item}">${item}</option>`).join('');
      template.innerHTML = baseHtml;

      const allSelects = document.querySelectorAll('.categories');
      allSelects.forEach(select => {
        const currentValue = select.value;
        select.innerHTML = baseHtml;
        if (currentValue) {
          select.value = currentValue;
        }
      });
    })
    .withFailureHandler((error) => {
      console.error("Erreur lors du chargement des catégories:", error);
    })
    .getCategories();
}

// Execute on page load
window.addEventListener('load', () => {
  loadDisciplines();
  loadCategories();
});

</script>
