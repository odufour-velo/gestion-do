<script>

const epreuvesList = document.getElementById('epreuvesList');

function renderEpreuves() {

    const epreuvesContainer = document.getElementById('epreuvesContainer');
    const discipline = document.getElementById('discipline').value;
    const typeRoute = document.getElementById('type_route').value;
    epreuvesList.innerHTML = '';
    
    if (!discipline) { epreuvesContainer.classList.add('hidden'); return; }
    epreuvesContainer.classList.remove('hidden');
    
    document.getElementById('typeRoutePanel').classList.toggle('hidden', discipline.toLowerCase() !== 'route');
    document.getElementById('distCircuitGeneral').classList.toggle('hidden', !(discipline.toLowerCase() === 'route' && typeRoute === 'circuit'));
    document.getElementById('prixGeneraux').classList.toggle('hidden', (discipline.toLowerCase() === 'route' && typeRoute === 'circuit'));

    addEpreuveRow();
}

function addEpreuveRow() {

  const catOptions = document.getElementById('categoriesTemplate').innerHTML || '<option value="">-- Choisir --</option>';

    const discipline = document.getElementById('discipline').value;
    const typeRoute = document.getElementById('type_route').value;
    const div = document.createElement('div');
    div.className = 'epreuve-item';

    let rowHtml = '<div class="row">';
    if (discipline.toLowerCase() === 'route' && typeRoute === 'circuit') {
        rowHtml += `
            <div class="field"><label>Dossards</label><input type="time" name="h_doss[]"></div>
            <div class="field"><label>Départ</label><input type="time" name="h_dep[]"></div>
            <div class="field"><label>Tours</label><input type="number" name="tours[]" oninput="calculerDistLigne(this)"></div>
            <div class="field"><label>Distance Totale</label><input type="text" name="dist_totale[]" readonly placeholder=""></div>
            <div class="field"><label>Cat. Min</label><select name="cat_min[]">${catOptions}</select></div>
            <div class="field"><label>Cat. Max</label><select name="cat_max[]">${catOptions}</select></div>
            <div class="field"><label>Engag. (€)</label><input type="number" step="0.5" name="prix_engag[]"></div>
            <div class="field"><label>Grille</label><input type="text" name="grille_prix[]"></div>
        `;
    } else if (discipline.toLowerCase() === 'route' && typeRoute === 'course_ligne') {
        rowHtml += `
            <div class="field"><label>Départ</label><input type="time" name="h_dep[]"></div>
            <div class="field"><label>Ville Départ</label><input type="text" name="v_dep[]"></div>
            <div class="field"><label>Ville Arrivée</label><input type="text" name="v_arr[]"></div>
            <div class="field"><label>Distance (km)</label><input type="number" step="0.1" name="dist[]"></div>
        `;
    } else {
        rowHtml += `
            <div class="field"><label>Dossards</label><input type="time" name="h_doss[]"></div>
            <div class="field"><label>Départ</label><input type="time" name="h_dep[]"></div>
            <div class="field"><label>Cat. Min</label><select name="cat_min[]">${catOptions}</select></div>
            <div class="field"><label>Cat. Max</label><select name="cat_max[]">${catOptions}</select></div>
        `;
    }
    rowHtml += `<button type="button" class="btn-remove" onclick="this.parentElement.parentElement.remove()">✕</button></div>`;
    div.innerHTML = rowHtml;
    epreuvesList.appendChild(div);
}

// Calcule la distance pour UNE ligne spécifique
function calculerDistLigne(inputTours) {
    const row = inputTours.closest('.row');
    const distCircuit = document.getElementById('dist_circuit').value;
    const tours = inputTours.value;
    const output = row.querySelector('input[name="dist_totale[]"]');
    
    if (distCircuit && tours) {
        const total = parseFloat(distCircuit) * parseInt(tours);
        output.value = total.toFixed(2) + " km";
    } else {
        output.value = "";
    }
}

// Recalcule TOUTES les lignes (utile si on change la distance du circuit après avoir saisi les tours)
function calculerToutesDistances() {
    const allTours = document.getElementsByName('tours[]');
    allTours.forEach(input => calculerDistLigne(input));
}
  
function handleFormSubmit(e){

  e.preventDefault();

  // Get button and status elements
  const form   = document.getElementById('declarationForm');
  const btn    = document.getElementById('submitBtn');
  const status = document.getElementById('statusMessage');

  if (!form.checkValidity()) {
      status.innerText = "⚠️ Veuillez remplir tous les champs obligatoires (*).";
      status.className = "status-hidden status-error";
      form.reportValidity(); 
      return;
  }

  // Disable button and prepare status
  btn.disabled     = true;
  btn.innerText    = "Envoi en cours...";
  status.className = "status-hidden"; // Reinitialize status

  const finalData = {};
  
  // On itère sur tous les éléments du formulaire
  Array.from(form.elements).forEach(element => {
      // On ne prend que les éléments qui ont un nom et qui sont visibles
      if (element.name && element.closest('.hidden') === null) {
          
          // Gestion des champs multiples (tableaux [])
          if (element.name.endsWith('[]')) {
              const key = element.name.slice(0, -2);
              if (!finalData[key]) finalData[key] = [];
              finalData[key].push(element.value);
          } else {
              finalData[element.name] = element.value;
          }
      }
  });
  console.log(finalData);

  // Envoi vers Google Apps Script (Code.gs)
  google.script.run
      .withSuccessHandler(() => {
        status.innerText = "✅ Données enregistrées avec succès !";
        status.className = "status-hidden status-success";
        btn.innerText = "Enregistré !";
      })
      .withFailureHandler((error) => {
      // Enable button in case of error
      status.innerText = "❌ Erreur : " + error.message;
      status.className = "status-hidden status-error";
      btn.disabled = false;
      btn.innerText = "Réessayer l'envoi";
      })
      .processForm(finalData);

}
  

function loadDisciplines() {
  google.script.run
    .withSuccessHandler(function(list) {
      const select = document.getElementById('discipline');
      
      // On vide le "Chargement..."
      select.innerHTML = '<option value="">-- Choisir --</option>';
      
      // On ajoute chaque discipline
      list.forEach(item => {
        const option = document.createElement('option');
        option.value = item;
        option.text = item;
        select.appendChild(option);
      });
    })
    .getDisciplines();
}

function loadCategories() {
  google.script.run
    .withSuccessHandler(function(list) {
      const template = document.getElementById('categoriesTemplate');
      const baseHtml = '<option value="">-- Choisir --</option>' + list.map(item => `<option value="${item}">${item}</option>`).join('');
      template.innerHTML = baseHtml;

      const allSelects = document.querySelectorAll('.categories');
      allSelects.forEach(select => {
        const currentValue = select.value;
        select.innerHTML = baseHtml;
        if (currentValue) {
          select.value = currentValue;
        }
      });
    })
    .getCategories();
}

// Execute on page load
window.onload = function() {
  loadDisciplines();
  loadCategories();
};

</script>
