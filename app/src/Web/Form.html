<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Déclaration d'organisation</title>
    <?!= include('Web/FormCSS.html') ?>
</head>
<body>

    <header>
        <h1>Déclaration d'organisation</h1>
    </header>

    <form id="declarationForm" onsubmit="handleFormSubmit(event)">

        <div id="categoriesTemplate" class="categories hidden">
            <option value="">-- Choisir --</option>
        </div>
        
        <div class="panel">
            <h2>Discipline</h2>
            <div class="row">
                <div class="field">
                    <label for="discipline">Discipline</label>
                    <select id="discipline" name="discipline" onchange="renderEpreuves()">
                        <option value="">-- Choisir --</option>
                    </select>
                </div>
                <div id="typeRoutePanel" class="field hidden">
                    <label for="type_route">Type d'épreuve (Route)</label>
                    <select id="type_route" name="type_route" onchange="renderEpreuves()">
                        <option value="course_ligne">Course en ligne / Étapes</option>
                        <option value="circuit">Circuit</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Informations Générales</h2>
            <div class="row">
                <div class="field"><label>Organisateur</label><input type="text" id="organizer" name="organizer" required></div>
                <div class="field"><label>Mail</label><input type="email" id="mail" name="mail" required></div>
                <div class="field"><label>Tel</label><input type="tel" id="tel" name="tel"></div>
            </div>
            <div class="row">
                <div class="field"><label>Nom</label><input type="text" id="name" name="name" required></div>
                <div class="field"><label>Date</label><input type="date" id="date" name="date" required></div>
                <div class="field"><label>Lieu</label><input type="text" id="location" name="location" required></div>
                <div id="distCircuitGeneral" class="field hidden">
                    <label for="dist_circuit">Distance du circuit (km)</label>
                    <input type="number" id="dist_circuit" name="distance_circuit" step="0.001" oninput="calculerToutesDistances()">
                </div>
            </div>
            <div id="prixGeneraux" class="row hidden">
                <div class="field"><label>Catégorie Min</label><select name="cat_min[]" class="categories"><option value="">-- Choisir --</option></select></div>
                <div class="field"><label>Catégorie Max</label><select name="cat_max[]" class="categories"><option value="">-- Choisir --</option></select></div>
                <div class="field"><label>Prix engagement (€)</label><input type="number" step="0.5" name="engagement"></div>
                <div class="field"><label>Grille de prix</label><input type="text" name="grid"></div>
            </div>
        </div>

        <div id="epreuvesContainer" class="panel hidden">
            <h2>Détails des épreuves</h2>
            <div id="epreuvesList"></div>
            <button type="button" class="btn-add" onclick="addEpreuveRow()">+ Ajouter une ligne</button>
        </div>

        <div class="panel">
            <h2>Informations complémentaires</h2>
            <textarea id="infos_sup" style="width:100%" name="infos"></textarea>
        </div>

        <button type="submit" id="submitBtn" style="width: 100%; padding: 15px; background-color: #2c3e50;">TRANSMETTRE LA DÉCLARATION</button>
        <div id="statusMessage" class="status-hidden"></div>
    </form>

    <?!= include('Web/FormJS.html') ?>
</body>
</html>
