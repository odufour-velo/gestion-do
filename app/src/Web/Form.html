<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <?!= include('Web/FormCSS'); ?>
  </head>
  <body>
    <form id="epreuveForm">
        <div class="card">
        <h3>Informations Générales</h3>
        <label>Nom de l'épreuve</label>
        <input type="text" id="nom" oninput="generateID()" required placeholder="ex: Grand Prix de la Ville">
        
        <p>Identifiant généré : <span id="idDisplay">---</span></p>

        <label>Type d'organisation</label>
        <div class="radio-group">
            <label><input type="radio" name="typeOrg" value="cat" checked onclick="toggleMode()"> Épreuves Multi-Catégories</label>
            <label><input type="radio" name="typeOrg" value="etapes" onclick="toggleMode()"> Course par Étapes</label>
        </div>

        <div style="display: flex; gap: 10px;">
            <div style="flex:1"><label>Lieu</label><input type="text" id="lieu" required></div>
            <div style="flex:1"><label>Discipline</label><input type="text" id="discipline"></div>
        </div>
        
        <div id="dateCommuneGroup">
            <label>Date (commune à toutes les catégories)</label>
            <input type="date" id="dateCommune">
        </div>
        </div>

        <div class="card">
        <h3 id="sectionTitle">Catégories</h3>
        <div id="itemsContainer"></div>
        <button type="button" class="btn-add" id="btnAdd" onclick="addItem()">+ Ajouter une catégorie</button>
        </div>

        <div class="card">
        <label>Engagement / Grille de prix</label>
        <input type="text" id="engagement" placeholder="Tarif">
        <input type="text" id="grille" placeholder="Grille de prix" style="margin-top:5px">
        
        <label>Contact</label>
        <input type="email" id="mail" placeholder="Email">
        <input type="tel" id="tel" placeholder="Téléphone">
        </div>

        <button type="submit" class="btn-save">Enregistrer dans la Sheet</button>
    </form>
    <?!= include('Web/FormJS'); ?>
  </body>
</html>
